<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>My Final Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<nav>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
    <a href="#tasks">Tasks</a>
</nav>

<section id="about">
    <h2>About Me</h2>
    <p>Mera naam Gulshan hai. Main 14 saal ka hoon aur Web Developer banna chahta hoon.</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg" alt="Red Apple" width="150" height="150">
</section>

<section id="tasks">
    <h2>Daily Tasks</h2>
    <ol>
        <li>School jaana</li>
        <li>Homework karna</li>
        <li>Game khelna</li>
    </ol>

    <h2>Favorite Fruits</h2>
    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ul>
</section>

<section id="contact">
    <h2>Contact Form</h2>
    <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <input type="submit" value="Submit">
    </form>

    <button onclick="showAlert()">Click Me!</button>
</section>

<footer>
    <p>Copyright © 2026 Gulshan</p>
</footer>

<script>
    // JavaScript for interactivity
    function showAlert() {
        alert("Hello! Tumne button click kiya.");
    }

    // Form submit handle
    document.getElementById("contactForm").addEventListener("submit", function(event){
        event.preventDefault(); // page reload nahi hoga
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        alert("Thank you " + name + "! We received your email: " + email);
        this.reset(); // form clear kar do
    });
</script>

</body>
</html>
