<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>My Website Level 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Welcome to My Level 6 Website</h1>
</header>

<nav>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#gallery">Gallery</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section id="home">
    <h2>Home</h2>
    <p>Ye mera Level 6 website ka home section hai.</p>
    <button id="myBtn">Click Me!</button>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>Mera naam Gulshan hai. Main web developer banna chahta hoon.</p>
</section>

<section id="gallery">
    <h2>Image Gallery</h2>
    <div class="gallery">
        <img src="images/apple.jpg" alt="Apple">
        <img src="images/mango.jpg" alt="Mango">
        <img src="images/banana.jpg" alt="Banana">
    </div>
</section>

<section id="contact">
    <h2>Contact Form</h2>
    <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="10" max="100" required><br><br>

        <input type="submit" value="Submit">
    </form>
</section>

<footer>
    <p>Copyright © 2026 Gulshan</p>
</footer>

<script src="script.js"></script>
</body>
</html>
